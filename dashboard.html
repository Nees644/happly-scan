<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happly Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dp:#1A0B2E;--pk:#D6026F;--rt:#FDF0F6;--wt:#fff;--tx:#1C1C1C;--tl:#5A4A6C;--bd:#EAE0EE;--bg:#F4EFF8}
body{font-family:"DM Sans",sans-serif;background:var(--bg);min-height:100vh}
/* TOPBAR */
.topbar{background:var(--dp);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar img{height:20px}
.topbar-right{display:flex;align-items:center;gap:16px}
.company-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.7)}
.toggle-anon{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-anon span{font-size:11px;color:rgba(255,255,255,.5)}
.toggle{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:.2s}
.toggle.on{background:var(--pk)}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s}
.toggle.on .toggle-knob{left:19px}
.btn-new{background:var(--pk);color:#fff;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:8px 18px;border:none;border-radius:5px;cursor:pointer;transition:.2s}
.btn-new:hover{background:#AA0055}
/* BREADCRUMB */
.breadcrumb{padding:16px 32px;display:flex;align-items:center;gap:8px;font-size:12px;color:#A090B8}
.bc-item{cursor:pointer;color:var(--pk)}
.bc-item:hover{text-decoration:underline}
.bc-sep{color:#C0B0D0}
/* MAIN */
.main{padding:0 32px 48px}
/* STATS ROW */
.stats{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.stat{background:var(--wt);border-radius:8px;padding:16px 22px;flex:1;min-width:140px;box-shadow:0 1px 6px rgba(26,11,46,.07)}
.stat-val{font-family:"DM Serif Display",serif;font-size:28px;color:var(--pk);line-height:1}
.stat-label{font-size:11px;color:#A090B8;margin-top:4px}
/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.team-card{background:var(--wt);border-radius:10px;padding:20px;box-shadow:0 1px 8px rgba(26,11,46,.08);cursor:pointer;transition:.2s;border-top:3px solid var(--pk)}
.team-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(26,11,46,.14)}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.tc-name{font-size:14px;font-weight:600;color:var(--dp)}
.tc-leader{font-size:11px;color:#A090B8;margin-top:2px}
.tc-count{font-size:11px;color:rgba(255,255,255,.7);background:var(--dp);padding:3px 10px;border-radius:12px}
.dim-bar-row{margin-bottom:8px}
.dim-bar-label{display:flex;justify-content:space-between;margin-bottom:3px}
.dim-bar-name{font-size:10px;color:var(--tl)}
.dim-bar-pct{font-size:10px;font-weight:500;color:var(--pk)}
.dim-track{height:6px;background:#EDE0EE;border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width 1s ease}
.gap-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 10px;border-radius:12px;margin-top:10px}
/* HEATMAP */
.heatmap{background:var(--wt);border-radius:10px;overflow:hidden;box-shadow:0 1px 8px rgba(26,11,46,.08);margin-bottom:28px}
.hm-title{background:var(--dp);padding:14px 20px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase}
.hm-table{width:100%;border-collapse:collapse}
.hm-th{padding:10px 16px;font-size:10px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bd)}
.hm-td{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tl)}
.hm-td:first-child{font-weight:500;color:var(--dp)}
.hm-cell{display:inline-flex;align-items:center;gap:6px}
.hm-dot{width:10px;height:10px;border-radius:50%}
/* TEAM DETAIL */
.team-detail{background:var(--wt);border-radius:10px;box-shadow:0 1px 8px rgba(26,11,46,.08);overflow:hidden}
.td-header{background:var(--dp);padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.td-title{font-family:"DM Serif Display",serif;font-size:20px;color:#fff}
.td-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
.td-body{padding:24px}
.agg-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.agg-card{flex:1;min-width:120px;background:var(--bg);border-radius:8px;padding:14px;text-align:center}
.agg-val{font-family:"DM Serif Display",serif;font-size:24px;color:var(--pk)}
.agg-dim{font-size:10px;color:#A090B8;margin-top:3px}
/* RESONANCE */
.res-section{background:#FFF8FC;border:1px solid #EEC0D8;border-radius:8px;padding:18px;margin-bottom:24px}
.res-title{font-size:11px;font-weight:600;color:var(--dp);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.res-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.res-dim{font-size:11px;color:var(--tl);width:100px;flex-shrink:0}
.res-bars{flex:1;display:flex;flex-direction:column;gap:4px}
.res-bar-wrap{display:flex;align-items:center;gap:6px}
.res-bar-label{font-size:9px;color:#B0A0C0;width:55px;flex-shrink:0}
.res-bar-track{flex:1;height:6px;background:#EDE0EE;border-radius:3px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:3px;transition:width 1s}
.res-gap{font-size:10px;font-weight:600;width:50px;text-align:right;flex-shrink:0}
/* INDIVIDUAL GRID */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ind-card{background:var(--bg);border-radius:8px;padding:14px;cursor:pointer;transition:.2s;border:1px solid var(--bd)}
.ind-card:hover{border-color:var(--pk);background:var(--rt)}
.ind-name{font-size:12px;font-weight:600;color:var(--dp);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ind-scores{display:flex;gap:6px}
.ind-score{text-align:center}
.ind-score-val{font-size:11px;font-weight:600;color:var(--pk)}
.ind-score-lbl{font-size:8.5px;color:#B0A0C0}
/* INDIVIDUAL DETAIL */
.ind-detail{background:var(--wt);border-radius:10px;box-shadow:0 1px 8px rgba(26,11,46,.08);overflow:hidden;margin-top:24px}
.id-header{background:var(--dp);padding:18px 24px}
.id-name{font-family:"DM Serif Display",serif;font-size:20px;color:#fff}
.id-meta{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px}
.id-body{padding:24px}
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.id-card{border:1px solid var(--bd);border-radius:8px;padding:14px;position:relative}
.id-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--pk);border-radius:3px 3px 0 0}
.id-dim{font-size:9.5px;font-weight:600;color:var(--dp);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.id-pct{font-family:"DM Serif Display",serif;font-size:26px;color:var(--pk);line-height:1;margin-bottom:4px}
.id-lv{font-size:9.5px;font-weight:500;padding:2px 9px;border-radius:10px;display:inline-block;margin-bottom:7px}
.id-bar-track{height:5px;background:#EDE0EE;border-radius:3px;overflow:hidden;margin-bottom:7px}
.id-bar-fill{height:100%;background:var(--pk);border-radius:3px;transition:width 1s}
.id-obs{font-size:11px;font-weight:300;color:var(--tl);line-height:1.55}
.vs-team{font-size:10px;color:#A090B8;margin-top:6px}
.vs-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9.5px;font-weight:500}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,11,46,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--wt);border-radius:12px;padding:32px;width:90%;max-width:480px}
.modal h2{font-family:"DM Serif Display",serif;font-size:22px;color:var(--dp);margin-bottom:6px}
.modal p{font-size:12.5px;color:var(--tl);margin-bottom:22px;font-weight:300}
.inp{width:100%;padding:12px 16px;border:1.5px solid var(--bd);border-radius:7px;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--tx);margin-bottom:12px;outline:none;transition:.18s}
.inp:focus{border-color:var(--pk)}
.modal-url{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:12px 14px;font-size:11.5px;color:var(--tl);word-break:break-all;margin-bottom:8px}
.modal-url strong{color:var(--pk)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:transparent;color:#A090B8;border:1.5px solid var(--bd);font-family:"DM Sans",sans-serif;font-size:13px;padding:10px 20px;border-radius:6px;cursor:pointer}
.loading{text-align:center;padding:80px;color:#A090B8}
.app-hidden{display:none!important}
.login-screen{position:fixed;inset:0;background:var(--dp);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--wt);border-radius:12px;padding:40px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-box h1{font-family:"DM Serif Display",serif;font-size:26px;color:var(--dp);margin-bottom:6px}
.login-box h1 span{color:var(--pk)}
.login-box p{font-size:13px;color:var(--tl);margin-bottom:22px;line-height:1.5}
.login-box .inp{margin-bottom:12px}
.login-err{color:var(--pk);font-size:12.5px;margin-bottom:12px;display:none;line-height:1.4}
.login-submit{width:100%;justify-content:center;padding:12px;font-size:14px}
.btn-logout{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.22);font-family:"DM Sans",sans-serif;font-size:11.5px;padding:7px 14px;border-radius:6px;cursor:pointer}
.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,.4)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>happly<span>.</span></h1>
    <p>Log in om je dashboard te bekijken.</p>
    <div class="login-err" id="login-err"></div>
    <input class="inp" id="login-email" type="email" placeholder="E-mailadres" autocomplete="username">
    <input class="inp" id="login-pass" type="password" placeholder="Wachtwoord" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-new login-submit" id="login-btn" onclick="doLogin()">Inloggen</button>
  </div>
</div>

<div id="app" class="app-hidden">
<!-- TOPBAR -->
<div class="topbar">
  <img src="happly-logo.svg" alt="happly">
  <div class="topbar-right">
    <span class="company-name" id="company-name">Laden...</span>
    <div class="toggle-anon" onclick="toggleAnon()">
      <span>Anonimiseer</span>
      <div class="toggle" id="anon-toggle"><div class="toggle-knob"></div></div>
    </div>
    <button class="btn-new" onclick="openModal()">+ Nieuwe campagne</button>
    <button class="btn-logout" onclick="doLogout()">Uitloggen</button>
  </div>
</div>

<!-- BREADCRUMB -->
<div class="breadcrumb" id="breadcrumb">
  <span class="bc-item" onclick="showCompanyView()">Company</span>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="loading">Dashboard laden...</div>
</div>

<!-- NIEUWE CAMPAGNE MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Nieuwe campagne</h2>
    <p>Maak een scan-campagne aan voor een team. U krijgt twee unieke links: één voor medewerkers en één voor de leidinggevende.</p>
    <input class="inp" id="m-team" placeholder="Teamnaam (bijv. Team Finance)" type="text">
    <input class="inp" id="m-leader" placeholder="Naam leidinggevende (optioneel)" type="text">
    <input class="inp" id="m-dept" placeholder="Afdeling (optioneel)" type="text">
    <div id="m-result" style="display:none">
      <div style="font-size:10px;font-weight:600;color:var(--dp);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Scan-links</div>
      <div class="modal-url" id="m-url-mw"></div>
      <div class="modal-url" id="m-url-lg" style="margin-top:6px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Sluiten</button>
      <button class="btn-new" id="m-btn" onclick="createCampaign()">Aanmaken</button>
    </div>
  </div>
</div>
</div>

<script>
const db=window.supabase.createClient('https://uqulkznqcqpbagbvtqdr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxdWxrem5xY3FwYmFnYnZ0cWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTAxMzAsImV4cCI6MjA5Nzg4NjEzMH0.3fkaYjn67zsCIdl53n9N5D3638iKPciqk5sgxNwaDS8');
const LEVELS=[{max:40,label:"Nog onbenut",bg:"#FDE8F1",col:"#AA0044"},{max:65,label:"Aan het ontwaken",bg:"#F7D0E3",col:"#D6026F"},{max:85,label:"In beweging",bg:"#E870B8",col:"#fff"},{max:100,label:"In kracht",bg:"#D6026F",col:"#fff"}];
const DIM_COLORS={ok:"#22C55E",warn:"#F59E0B",risk:"#EF4444"};
const OBS_SHORT={ZR:["Zelfreflectie: sterk ontwikkelgebied","Zelfreflectie: in ontwikkeling","Zelfreflectie: groeiend","Zelfreflectie: in kracht"],ZrR:["Zelfregie: sterk ontwikkelgebied","Zelfregie: in ontwikkeling","Zelfregie: groeiend","Zelfregie: in kracht"],ZS:["Zelfstarten: sterk ontwikkelgebied","Zelfstarten: in ontwikkeling","Zelfstarten: groeiend","Zelfstarten: in kracht"],LR:["Leider-resonantie: urgent","Leider-resonantie: in ontwikkeling","Leider-resonantie: groeiend","Leider-resonantie: in kracht"]};

let STATE={company:null,campaigns:[],results:[],leads:[],anonymize:false,view:'company',selCampaign:null,selResult:null};
let anonMap={};

function lv(p){for(let l of LEVELS)if(p<=l.max)return l;return LEVELS[3];}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;}
function dimColor(p){return p<=40?"#D6026F":p<=65?"#E86AA0":p<=85?"#22B07D":"#0F7A5C";}
function gapColor(g){const a=Math.abs(g);return a<=10?"#22C55E":a<=20?"#F59E0B":"#EF4444";}
function displayName(r,idx){
  if(r.is_anonymous)return"Anoniem";
  if(STATE.anonymize){if(!anonMap[r.id])anonMap[r.id]="Deelnemer "+(idx+1);return anonMap[r.id];}
  return r.participant_name||"Onbekend";
}

function toggleAnon(){
  STATE.anonymize=!STATE.anonymize;
  document.getElementById("anon-toggle").classList.toggle("on",STATE.anonymize);
  render();
}

async function loadData(){
  const params=new URLSearchParams(window.location.search);
  const slug=params.get("company")||"demo";
  const {data:company}=await db.from("companies").select("*").eq("dashboard_slug",slug).single();
  if(!company){document.getElementById("main").innerHTML='<div class="loading" style="color:#D6026F">Bedrijf niet gevonden. Controleer de URL.</div>';return;}
  STATE.company=company;
  document.getElementById("company-name").textContent=company.name;
  document.title="Dashboard · "+company.name;
  const {data:campaigns}=await db.from("campaigns").select("*").eq("company_id",company.id).order("created_at",{ascending:false});
  STATE.campaigns=campaigns||[];
  const cids=(STATE.campaigns).map(c=>c.id);
  if(cids.length>0){
    const {data:results}=await db.from("scan_results").select("*").in("campaign_id",cids);
    STATE.results=results||[];
  }
  const {data:leads}=await db.from("quick_scan_leads").select("*").order("created_at",{ascending:false});
  STATE.leads=leads||[];
  render();
}

function campaignResults(campaignId){return STATE.results.filter(r=>r.campaign_id===campaignId);}
function teamStats(results){
  const members=results.filter(r=>!r.is_leader);
  const leader=results.find(r=>r.is_leader)||null;
  return{
    count:members.length,
    avg_zr:avg(members.map(r=>r.score_zr)),
    avg_zrr:avg(members.map(r=>r.score_zrr)),
    avg_zs:avg(members.map(r=>r.score_zs)),
    leader,
    gap:leader?{
      zr:leader.score_zr-(avg(members.map(r=>r.score_zr))||0),
      zrr:leader.score_zrr-(avg(members.map(r=>r.score_zrr))||0),
      zs:leader.score_zs-(avg(members.map(r=>r.score_zs))||0)
    }:null
  };
}

function render(){
  updateBreadcrumb();
  if(STATE.view==='company')renderCompany();
  else if(STATE.view==='team')renderTeam();
  else renderIndividual();
}

function updateBreadcrumb(){
  let bc='<span class="bc-item" onclick="showCompanyView()">'+STATE.company.name+'</span>';
  if(STATE.selCampaign)bc+='<span class="bc-sep">›</span><span class="bc-item" onclick="showTeamView(STATE.selCampaign)">'+STATE.selCampaign.team_name+'</span>';
  if(STATE.selResult)bc+='<span class="bc-sep">›</span><span style="color:var(--tl)">'+displayName(STATE.selResult,0)+'</span>';
  document.getElementById("breadcrumb").innerHTML=bc;
}

function showCompanyView(){STATE.view='company';STATE.selCampaign=null;STATE.selResult=null;render();}
function showTeamView(c){STATE.view='team';STATE.selCampaign=c;STATE.selResult=null;render();}
function showIndividualView(r){STATE.view='individual';STATE.selResult=r;render();}

function renderCompany(){
  const allR=STATE.results.filter(r=>!r.is_leader);
  const overallZR=avg(allR.map(r=>r.score_zr));
  const overallZrR=avg(allR.map(r=>r.score_zrr));
  const overallZS=avg(allR.map(r=>r.score_zs));
  const totalComp=STATE.results.length;
  const totalTeams=STATE.campaigns.length;

  let statsHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-val">${totalTeams}</div><div class="stat-label">Teams</div></div>
      <div class="stat"><div class="stat-val">${totalComp}</div><div class="stat-label">Completions</div></div>
      <div class="stat"><div class="stat-val">${overallZR!==null?overallZR+'%':'–'}</div><div class="stat-label">Ø Zelfreflectie</div></div>
      <div class="stat"><div class="stat-val">${overallZrR!==null?overallZrR+'%':'–'}</div><div class="stat-label">Ø Zelfregie</div></div>
      <div class="stat"><div class="stat-val">${overallZS!==null?overallZS+'%':'–'}</div><div class="stat-label">Ø Zelfstarten</div></div>
    </div>`;

  // Heatmap
  let hmRows=STATE.campaigns.map(c=>{
    const res=campaignResults(c.id);
    const st=teamStats(res);
    function cell(v){
      if(v===null)return'<td class="hm-td">–</td>';
      const l=lv(v);
      return`<td class="hm-td"><span class="hm-cell"><span class="hm-dot" style="background:${dimColor(v)}"></span>${v}%</span></td>`;
    }
    return`<tr onclick="showTeamView(STATE.campaigns.find(x=>x.id=='${c.id}'))" style="cursor:pointer"><td class="hm-td">${c.team_name}<div style="font-size:10px;color:#B0A0C0">${st.count} deelnemers</div></td>${cell(st.avg_zr)}${cell(st.avg_zrr)}${cell(st.avg_zs)}</tr>`;
  }).join('');

  let heatmapHTML=`
    <div class="heatmap">
      <div class="hm-title">Overzicht per team</div>
      <table class="hm-table">
        <thead><tr><th class="hm-th">Team</th><th class="hm-th">Zelfreflectie</th><th class="hm-th">Zelfregie</th><th class="hm-th">Zelfstarten</th></tr></thead>
        <tbody>${hmRows||'<tr><td class="hm-td" colspan="4" style="color:#B0A0C0">Nog geen resultaten</td></tr>'}</tbody>
      </table>
    </div>`;

  // Team cards
  let cardsHTML='<div class="team-grid">'+STATE.campaigns.map(c=>{
    const res=campaignResults(c.id);
    const st=teamStats(res);
    function bar(v,label){
      if(v===null)return'';
      return`<div class="dim-bar-row"><div class="dim-bar-label"><span class="dim-bar-name">${label}</span><span class="dim-bar-pct">${v}%</span></div><div class="dim-track"><div class="dim-fill" style="width:${v}%;background:${dimColor(v)}"></div></div></div>`;
    }
    let gapBadge='';
    if(st.gap){
      const maxGap=Math.max(Math.abs(st.gap.zr),Math.abs(st.gap.zrr),Math.abs(st.gap.zs));
      if(maxGap>15)gapBadge=`<span class="gap-badge" style="background:#FDE8F1;color:#AA0044">⚠ Resonantie-gap ${maxGap>0?'+':''}${maxGap}%</span>`;
      else gapBadge=`<span class="gap-badge" style="background:#ECFDF5;color:#065F46">✓ Leiderschapsprofiel OK</span>`;
    }
    return`<div class="team-card" onclick="showTeamView(STATE.campaigns.find(x=>x.id=='${c.id}'))">
      <div class="tc-head"><div><div class="tc-name">${c.team_name}</div><div class="tc-leader">${c.leader_name||'Geen leider gekoppeld'}</div></div><span class="tc-count">${st.count}</span></div>
      ${bar(st.avg_zr,'Zelfreflectie')}${bar(st.avg_zrr,'Zelfregie')}${bar(st.avg_zs,'Zelfstarten')}
      ${gapBadge}
    </div>`;
  }).join('')+'</div>';


  // Quick Scan Leads sectie
  let leadsHTML='';
  if(STATE.leads.length>0){
    const dimColor2=p=>p<=40?"#D6026F":p<=65?"#E86AA0":p<=85?"#22B07D":"#0F7A5C";
    const rows=STATE.leads.map(l=>`<tr>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--dp);font-weight:500">${l.name||'Anoniem'}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:#7A6080;font-weight:300">${l.company||'–'}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--pk)">${l.email}</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:${dimColor2(l.score_zr)}">${l.score_zr||'–'}%</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:${dimColor2(l.score_zrr)}">${l.score_zrr||'–'}%</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:${dimColor2(l.score_zs)}">${l.score_zs||'–'}%</td>
      <td style="padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;color:#B0A0C0">${new Date(l.created_at).toLocaleDateString('nl-NL')}</td>
    </tr>`).join('');
    leadsHTML=`<div style="background:var(--wt);border-radius:10px;box-shadow:0 1px 8px rgba(26,11,46,.08);overflow:hidden;margin-bottom:28px">
      <div style="background:var(--dp);padding:14px 20px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase">Quick Scan Leads</span>
        <span style="font-size:11px;color:var(--pk);font-weight:600">${STATE.leads.length} leads</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:#FAF7FC">
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">Naam</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">Bedrijf</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">Email</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">ZR</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">ZrR</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">ZS</th>
            <th style="padding:10px 14px;font-size:9.5px;font-weight:600;color:#A090B8;letter-spacing:.08em;text-transform:uppercase;text-align:left">Datum</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }
  document.getElementById("main").innerHTML=statsHTML+leadsHTML+heatmapHTML+cardsHTML;
}

function renderTeam(){
  const c=STATE.selCampaign;
  const res=campaignResults(c.id);
  const st=teamStats(res);
  const members=res.filter(r=>!r.is_leader);

  function agg(v,lbl){
    if(v===null)return`<div class="agg-card"><div class="agg-val">–</div><div class="agg-dim">${lbl}</div></div>`;
    return`<div class="agg-card"><div class="agg-val" style="color:${dimColor(v)}">${v}%</div><div class="agg-dim">${lbl}</div></div>`;
  }

  let resonanceHTML='';
  if(st.leader&&st.gap){
    function resRow(dim,leaderV,teamV,gap){
      const gc=gapColor(gap);
      const sign=gap>=0?'+':'';
      return`<div class="res-row">
        <div class="res-dim">${dim}</div>
        <div class="res-bars">
          <div class="res-bar-wrap"><span class="res-bar-label">Leidinggevende</span><div class="res-bar-track"><div class="res-bar-fill" style="width:${leaderV||0}%;background:var(--pk)"></div></div></div>
          <div class="res-bar-wrap"><span class="res-bar-label">Team gem.</span><div class="res-bar-track"><div class="res-bar-fill" style="width:${teamV||0}%;background:#A090B8"></div></div></div>
        </div>
        <div class="res-gap" style="color:${gc}">${sign}${gap}%</div>
      </div>`;
    }
    resonanceHTML=`<div class="res-section">
      <div class="res-title">Leider-team vergelijking (resonantie-analyse)</div>
      ${resRow('Zelfreflectie',st.leader.score_zr,st.avg_zr,st.gap.zr)}
      ${resRow('Zelfregie',st.leader.score_zrr,st.avg_zrr,st.gap.zrr)}
      ${resRow('Zelfstarten',st.leader.score_zs,st.avg_zs,st.gap.zs)}
      ${Math.abs(st.gap.zr)>15||Math.abs(st.gap.zrr)>15||Math.abs(st.gap.zs)>15?'<p style="font-size:11.5px;color:#8B003A;margin-top:12px;font-weight:300">⚠ Significante discrepantie gedetecteerd. Een gesprek met Happly Advies wordt aanbevolen.</p>':''}
    </div>`;
  }

  let indHTML='<div style="font-size:11px;font-weight:600;color:var(--dp);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">Individuele scores</div>';
  if(members.length===0){
    indHTML+='<p style="color:#B0A0C0;font-size:13px">Nog geen deelnemers. Deel de scan-link met uw team.</p>';
  } else {
    indHTML+='<div class="ind-grid">'+members.map((r,i)=>{
      const nm=displayName(r,i);
      return`<div class="ind-card" onclick="showIndividualView(STATE.results.find(x=>x.id=='${r.id}'))">
        <div class="ind-name">${nm}</div>
        <div class="ind-scores">
          <div class="ind-score"><div class="ind-score-val" style="color:${dimColor(r.score_zr)}">${r.score_zr||'–'}%</div><div class="ind-score-lbl">ZR</div></div>
          <div class="ind-score"><div class="ind-score-val" style="color:${dimColor(r.score_zrr)}">${r.score_zrr||'–'}%</div><div class="ind-score-lbl">ZrR</div></div>
          <div class="ind-score"><div class="ind-score-val" style="color:${dimColor(r.score_zs)}">${r.score_zs||'–'}%</div><div class="ind-score-lbl">ZS</div></div>
        </div>
      </div>`;
    }).join('')+'</div>';
  }

  // Scan links
  const baseUrl=window.location.origin+window.location.pathname.replace('dashboard.html','');
  const linkMW=`<span style="color:#A090B8">Medewerkers:</span> <strong style="color:var(--pk)">${baseUrl}scan_mw.html?token=${c.token}</strong>`;
  const linkLG=`<span style="color:#A090B8">Leidinggevende:</span> <strong style="color:var(--pk)">${baseUrl}scan_lg.html?token=${c.token}</strong>`;

  document.getElementById("main").innerHTML=`
    <div class="team-detail">
      <div class="td-header">
        <div>
          <div class="td-title">${c.team_name}</div>
          <div class="td-meta">${c.leader_name?'Leidinggevende: '+c.leader_name+' · ':''}${members.length} deelnemers · token: ${c.token}</div>
        </div>
      </div>
      <div class="td-body">
        <div class="agg-row">
          ${agg(st.avg_zr,'Ø Zelfreflectie')}
          ${agg(st.avg_zrr,'Ø Zelfregie')}
          ${agg(st.avg_zs,'Ø Zelfstarten')}
        </div>
        ${resonanceHTML}
        ${indHTML}
        <div style="margin-top:24px;padding:16px;background:var(--bg);border-radius:8px;font-size:11.5px;color:var(--tl)">
          <strong style="display:block;margin-bottom:8px;color:var(--dp)">Scan-links voor dit team</strong>
          <div style="margin-bottom:6px">${linkMW}</div>
          <div>${linkLG}</div>
        </div>
      </div>
    </div>`;
}

function renderIndividual(){
  const r=STATE.selResult;
  const c=STATE.campaigns.find(x=>x.id===r.campaign_id);
  const teamRes=STATE.results.filter(x=>x.campaign_id===r.campaign_id&&!x.is_leader);
  const tAvgZR=avg(teamRes.map(x=>x.score_zr));
  const tAvgZrR=avg(teamRes.map(x=>x.score_zrr));
  const tAvgZS=avg(teamRes.map(x=>x.score_zs));
  const idx=teamRes.findIndex(x=>x.id===r.id);
  const nm=displayName(r,idx);

  function card(dim,key,pct,teamAvg){
    if(pct===null)return'';
    const l=lv(pct);
    const diff=teamAvg!==null?pct-teamAvg:null;
    const diffTxt=diff!==null?`<div class="vs-team">vs team: <span class="vs-badge" style="background:${diff>=0?'#ECFDF5':'#FDE8F1'};color:${diff>=0?'#065F46':'#8B003A'}">${diff>=0?'+':''}${diff}%</span></div>`:'';
    const obs_short=[["Sterk ontwikkelgebied","In ontwikkeling","Groeiend","In kracht"]][0];
    return`<div class="id-card"><div class="id-dim">${dim}</div><div class="id-pct">${pct}%</div><span class="id-lv" style="background:${l.bg};color:${l.col}">${l.label}</span><div class="id-bar-track"><div class="id-bar-fill" style="width:${pct}%"></div></div>${diffTxt}</div>`;
  }

  const cx1txt=['Voornamelijk werk','Voornamelijk privé','Combinatie','Onduidelijk'];
  const drukbron=r.cx1_drukbron!==null?'<p style="font-size:12px;color:#A090B8;margin-bottom:16px">Drukbron: '+cx1txt[r.cx1_drukbron]+'</p>':'';

  document.getElementById("main").innerHTML=`
    <div class="ind-detail">
      <div class="id-header">
        <div class="id-name">${nm}</div>
        <div class="id-meta">${c?c.team_name:''}</div>
      </div>
      <div class="id-body">
        ${drukbron}
        <div class="id-grid">
          ${card('Zelfreflectie','ZR',r.score_zr,tAvgZR)}
          ${card('Zelfregie','ZrR',r.score_zrr,tAvgZrR)}
          ${card('Zelfstarten','ZS',r.score_zs,tAvgZS)}
          ${r.score_lr!==null?card('Leider-resonantie','LR',r.score_lr,null):''}
        </div>
        <p style="font-size:11.5px;color:#B0A0C0;margin-top:8px">Ingevuld: ${new Date(r.completed_at).toLocaleDateString('nl-NL')}</p>
      </div>
    </div>`;
}

// MODAL / CAMPAIGN CREATION
function openModal(){document.getElementById("modal").classList.add("open");document.getElementById("m-result").style.display="none";document.getElementById("m-btn").textContent="Aanmaken";}
function closeModal(){document.getElementById("modal").classList.remove("open");}

function genToken(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');}

async function createCampaign(){
  const teamName=document.getElementById("m-team").value.trim();
  if(!teamName){alert("Voer een teamnaam in.");return;}
  const leaderName=document.getElementById("m-leader").value.trim()||null;
  const dept=document.getElementById("m-dept").value.trim()||null;
  document.getElementById("m-btn").textContent="Aanmaken...";
  document.getElementById("m-btn").disabled=true;
  
  let token=genToken(),attempts=0;
  while(attempts<10){
    const {data:existing}=await db.from("campaigns").select("id").eq("token",token).single();
    if(!existing)break;
    token=genToken();attempts++;
  }
  
  const {data,error}=await db.from("campaigns").insert({
    company_id:STATE.company.id,
    team_name:teamName,
    leader_name:leaderName,
    department:dept,
    token:token
  }).select().single();
  
  if(error){alert("Fout bij aanmaken: "+error.message);document.getElementById("m-btn").textContent="Aanmaken";document.getElementById("m-btn").disabled=false;return;}
  
  STATE.campaigns.unshift(data);
  const base=window.location.href.replace(/dashboard.*$/,'');
  document.getElementById("m-url-mw").innerHTML='<strong>Medewerkers:</strong><br>'+base+'scan_mw.html?token='+token;
  document.getElementById("m-url-lg").innerHTML='<strong>Leidinggevende:</strong><br>'+base+'scan_lg.html?token='+token;
  document.getElementById("m-result").style.display="block";
  document.getElementById("m-btn").textContent="Sluiten";
  document.getElementById("m-btn").onclick=function(){closeModal();render();};
  document.getElementById("m-btn").disabled=false;
}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim();
  const pass=document.getElementById("login-pass").value;
  const errEl=document.getElementById("login-err");
  errEl.style.display="none";
  if(!email||!pass){errEl.textContent="Vul e-mailadres en wachtwoord in.";errEl.style.display="block";return;}
  document.getElementById("login-btn").disabled=true;
  document.getElementById("login-btn").textContent="Inloggen...";
  const {error}=await db.auth.signInWithPassword({email,password:pass});
  document.getElementById("login-btn").disabled=false;
  document.getElementById("login-btn").textContent="Inloggen";
  if(error){errEl.textContent="Inloggen mislukt. Controleer e-mailadres en wachtwoord.";errEl.style.display="block";return;}
  showApp();
}
function doLogout(){db.auth.signOut().then(()=>location.reload());}
function showApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").classList.remove("app-hidden");
  loadData();
}
async function checkAuth(){
  const {data:{session}}=await db.auth.getSession();
  if(session){showApp();}
  else{document.getElementById("login-screen").style.display="flex";}
}
window.addEventListener("load",checkAuth);
</script>
