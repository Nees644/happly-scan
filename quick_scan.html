<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happly Zelfkracht Quick Scan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dp:#1A0B2E;--pk:#D6026F;--rt:#FDF0F6;--wt:#fff;--tx:#1C1C1C;--bd:#EAE0EE}
body{font-family:"DM Sans",sans-serif;background:var(--dp);min-height:100vh;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:680px;min-height:100vh;background:var(--wt);display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1;animation:fi .35s ease}
.screen.active{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hdr{background:var(--dp);padding:20px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr img{height:22px}
.dots{display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:.3s}
.dot.done{background:var(--pk)}
.dot.cur{background:#fff;width:10px;height:10px}
.ptxt{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;margin-left:6px}
.body{flex:1;padding:44px 40px 24px;display:flex;flex-direction:column}
.eye{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--pk);font-weight:500;margin-bottom:20px}
.qtxt{font-family:"DM Serif Display",serif;font-size:22px;color:var(--dp);line-height:1.3;margin-bottom:32px;max-width:540px}
.opts{display:flex;flex-direction:column;gap:11px;flex:1}
.opt{display:flex;align-items:flex-start;gap:13px;padding:14px 18px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;transition:.18s;background:#fff}
.opt:hover{border-color:var(--pk);background:var(--rt)}
.opt.sel{border-color:var(--pk);background:var(--rt)}
.ol{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#A090B8;flex-shrink:0;transition:.18s;margin-top:1px}
.opt.sel .ol{background:var(--pk);border-color:var(--pk);color:#fff}
.ot{font-size:13.5px;font-weight:300;color:var(--tx);line-height:1.5;padding-top:3px}
.foot{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--pk);color:#fff;font-family:"DM Sans",sans-serif;font-size:13.5px;font-weight:500;padding:13px 30px;border:none;border-radius:6px;cursor:pointer;transition:.2s}
.btn:hover{background:#AA0055;transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--pk);border:1.5px solid var(--pk)}
.btn.ghost:hover{background:var(--rt);transform:none}
.btn.off{opacity:.35;pointer-events:none;transform:none}
.tag{font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;background:var(--rt);color:var(--pk)}
.tags{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 36px}
.rbar-track{height:8px;background:#EDE0EE;border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;background:var(--pk);border-radius:4px;transition:width 1.1s ease}
.rlevel{font-size:10px;font-weight:500;padding:3px 11px;border-radius:12px;display:inline-block;margin:8px 0 5px}
.robs{font-size:12.5px;font-weight:300;color:#5A4A6C;line-height:1.65}
.rdim{margin-bottom:22px}
.rdim-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.rdim-name{font-size:13px;font-weight:600;color:var(--dp)}
.rdim-pct{font-size:13px;font-weight:500;color:var(--pk)}
.ctabox{background:var(--dp);border-radius:10px;padding:26px 30px;margin-top:24px}
.ctabox h3{font-family:"DM Serif Display",serif;font-size:20px;color:#fff;margin-bottom:9px}
.ctabox p{font-size:12.5px;color:rgba(255,255,255,.58);line-height:1.65;margin-bottom:18px;font-weight:300}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.btn-wt{background:#fff;color:var(--pk)}
.btn-wt:hover{background:#f0e0ec;transform:translateY(-1px)}
/* LEAD CAPTURE */
.lead-box{background:var(--rt);border:1px solid #EEC0D8;border-radius:10px;padding:24px 28px;margin-top:20px}
.lead-eye{font-size:9px;font-weight:600;color:var(--pk);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.lead-title{font-family:"DM Serif Display",serif;font-size:20px;color:var(--dp);margin-bottom:8px}
.lead-desc{font-size:12.5px;font-weight:300;color:#5A4A6C;line-height:1.65;margin-bottom:18px}
.lead-inp{width:100%;padding:11px 15px;border:1.5px solid var(--bd);border-radius:7px;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--tx);margin-bottom:10px;outline:none;transition:.18s;background:#fff}
.lead-inp:focus{border-color:var(--pk)}
.lead-inp::placeholder{color:#B0A0C0}
.lead-inp.err{border-color:#D6026F}
.lead-skip{display:block;text-align:center;margin-top:12px;font-size:12px;color:#B0A0C0;cursor:pointer;text-decoration:none}
.lead-skip:hover{color:var(--pk)}
.lead-thanks{display:none;text-align:center;padding:20px 0}
.lead-thanks-icon{font-size:28px;margin-bottom:10px}
.lead-thanks-txt{font-size:14px;font-weight:500;color:var(--dp);margin-bottom:6px}
.lead-thanks-sub{font-size:12px;font-weight:300;color:#7A6080}
</style>
</head>
<body>
<div id="app">

<!-- WELCOME -->
<div class="screen active" id="s-w">
  <div class="hdr"><img src="happly-logo.svg" alt="happly"><span style="font-size:10px;color:rgba(255,255,255,.38);letter-spacing:.1em">QUICK SCAN</span></div>
  <div class="body">
    <div class="eye">Happly Zelfkracht Quick Scan</div>
    <div class="qtxt" style="font-size:30px">Hoe sterk is uw<br>Zelfkracht?</div>
    <p style="font-size:14px;font-weight:300;color:#5A4A6C;line-height:1.75;max-width:480px">In 5 situationele vragen krijgt u een eerste beeld van uw Zelfkracht op drie dimensies: Zelfreflectie, Zelfregie en Zelfstarten. Kies wat u werkelijk doet, niet wat u zou willen doen.</p>
    <div class="tags"><span class="tag">5 vragen</span><span class="tag">3 minuten</span><span class="tag">Direct resultaat</span></div>
    <button class="btn" onclick="start()">Start de scan &rarr;</button>
  </div>
</div>

<!-- QUESTIONS -->
<div class="screen" id="s-q"></div>

<!-- RESULTS -->
<div class="screen" id="s-r">
  <div class="hdr" style="padding:18px 36px"><img src="happly-logo.svg" alt="happly"><span style="font-size:10px;color:rgba(255,255,255,.38);letter-spacing:.1em">UW PROFIEL</span></div>
  <div class="body" id="r-body" style="padding:32px 40px 40px;overflow-y:auto"></div>
</div>

</div>
<script>
const db = window.supabase.createClient('https://uqulkznqcqpbagbvtqdr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxdWxrem5xY3FwYmFnYnZ0cWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTAxMzAsImV4cCI6MjA5Nzg4NjEzMH0.3fkaYjn67zsCIdl53n9N5D3638iKPciqk5sgxNwaDS8');

const QS=[
  {dim:"Zelfreflectie",eye:"Dimensie 1 van 3 · Zelfreflectie",
    text:"Een collega geeft kritiek op iets wat u heeft gedaan. Wat is uw eerste reactie?",
    opts:[["Ik merk wat er in mij omgaat en neem even afstand voordat ik reageer",4],["Ik luister, stel vragen en verwerk het later rustig",3],["Ik voel me aangevallen en verdedig mezelf direct",1],["Ik voel irritatie, maar vraag me ook af of de ander een punt heeft",2]]},
  {dim:"Zelfreflectie",eye:"Dimensie 1 van 3 · Zelfreflectie",
    text:"Denk aan iets wat u al langere tijd wilt veranderen maar steeds niet lukt. Wat verklaart dat het beste?",
    opts:[["Ik weet niet waarom het niet lukt, het overkomt me gewoon",2],["Ik begrijp de diepere oorsprong en werk er bewust aan",4],["Ik heb er simpelweg geen tijd of ruimte voor",1],["Ik herken het patroon en vermoed dat het te maken heeft met hoe ik ben opgegroeid of gewend te denken",3]]},
  {dim:"Zelfregie",eye:"Dimensie 2 van 3 · Zelfregie",
    text:"Een samenwerking loopt stroef. Wat is uw eerste gedachte?",
    opts:[["De omstandigheden zijn gewoon niet ideaal",2],["De ander maakt het moeilijk",1],["Ik benoem het en pak het actief op, ook als het ongemakkelijk is",4],["Ik vraag me af wat ik er zelf aan bijdraag",3]]},
  {dim:"Zelfregie",eye:"Dimensie 2 van 3 · Zelfregie",
    text:"U wilt iets aanpakken, maar mensen in uw omgeving denken er anders over. Wat doet u?",
    opts:[["Ik luister naar de bezwaren en maak dan mijn eigen keuze",4],["Ik wacht tot er meer draagvlak is",1],["Ik ga door en leg verantwoording af op basis van de resultaten",3],["Ik pas mijn plan aan op de verwachtingen van anderen",2]]},
  {dim:"Zelfstarten",eye:"Dimensie 3 van 3 · Zelfstarten",
    text:"U heeft zich iets voorgenomen. Na twee weken is er nog niets van terechtgekomen. Wat doet u?",
    opts:[["Ik stel de planning bij en probeer het opnieuw",2],["Ik definieer de kleinste mogelijke eerste stap en doe die vandaag nog",4],["Ik wacht tot ik er meer zin of energie voor voel",1],["Ik analyseer wat me tegenhield en pas mijn aanpak aan",3]]}
];

const LEVELS=[{max:40,label:"Nog onbenut",bg:"#FDE8F1",col:"#AA0044"},{max:65,label:"Aan het ontwaken",bg:"#F7D0E3",col:"#D6026F"},{max:85,label:"In beweging",bg:"#E870B8",col:"#fff"},{max:100,label:"In kracht",bg:"#D6026F",col:"#fff"}];
const OBS={
  ZR:["U reageert primair op triggers. De diepere lagen van uw emoties en conditionering zijn grotendeels onzichtbaar. Zelfreflectie is uw meest fundamentele ontwikkelgebied.","U heeft enige patroonherkenning, maar de systemische oorsprong van uw gedrag is nog weinig zichtbaar. Verdieping hier opent nieuwe deuren.","U beschikt over goed zelfbewustzijn. Verdere verdieping in overgenomen patronen versterkt dit fundament verder.","Sterke zelfreflectie. U bent bewust van triggers, emoties en de diepere lagen die uw gedrag sturen."],
  ZrR:["U handelt sterk vanuit externe verwachtingen en goedkeuring. Meer zelfregie geeft u de regie over uw eigen keuzes terug.","U heeft een begin van autonomie, maar externe druk bepaalt nog veel. Er is significante ruimte voor meer zelfregie.","U maakt bewuste keuzes, hoewel externe druk soms de overhand neemt. Verdere versterking is binnen bereik.","Sterke zelfregie. U handelt vanuit een intern kompas en neemt eigenaarschap, ook als het moeilijk is."],
  ZS:["U wacht op het juiste gevoel om in actie te komen. Actie creëert het goede gevoel — niet andersom. Dit is uw meest concrete ontwikkelkans.","U start, maar obstakels remmen uw follow-through. Faalangst of gebrek aan structuur spelen waarschijnlijk een rol.","U bent actiegericht. Kleine verbeteringen in planningsvermogen versterken uw zelfstarten verder.","Sterke zelfstarter. U zet intentie consequent om in actie, ook bij tegenslag."]
};

let ans=[null,null,null,null,null];
let savedScores={};
const LET=["A","B","C","D"];

function lv(p){for(let l of LEVELS)if(p<=l.max)return l;return LEVELS[3];}
function ob(k,p){const i=p<=40?0:p<=65?1:p<=85?2:3;return OBS[k][i];}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function start(){ans=[null,null,null,null,null];renderQ(0);show("s-q");}

function renderQ(qi){
  const q=QS[qi];
  const dots=QS.map((_,i)=>`<div class="dot ${i<qi?"done":i===qi?"cur":""}"></div>`).join("");
  const opts=q.opts.map(([txt,sc],i)=>`<div class="opt${ans[qi]===i?" sel":""}" onclick="pick(${qi},${i})"><div class="ol">${LET[i]}</div><div class="ot">${txt}</div></div>`).join("");
  document.getElementById("s-q").innerHTML=`
    <div class="hdr"><img src="happly-logo.svg" alt="happly"><div style="display:flex;align-items:center;gap:10px"><div class="dots">${dots}</div><span class="ptxt">${qi+1} / 5</span></div></div>
    <div class="body"><div class="eye">${q.eye}</div><div class="qtxt">${q.text}</div><div class="opts">${opts}</div></div>
    <div class="foot">
      <button class="btn ghost" onclick="prev(${qi})" style="visibility:${qi===0?"hidden":"visible"}">&#8592; Vorige</button>
      <button class="btn${ans[qi]===null?" off":""}" id="bn" onclick="next(${qi})">${qi<4?"Volgende &rarr;":"Bekijk resultaat &rarr;"}</button>
    </div>`;
}

function pick(qi,oi){ans[qi]=oi;renderQ(qi);}
function prev(qi){if(qi>0)renderQ(qi-1);}
function next(qi){if(ans[qi]===null)return;if(qi<4)renderQ(qi+1);else results();}

function results(){
  const sc=ans.map((a,i)=>QS[i].opts[a][1]);
  const ZR=Math.round((sc[0]+sc[1])/8*100);
  const ZrR=Math.round((sc[2]+sc[3])/8*100);
  const ZS=Math.round(sc[4]/4*100);
  savedScores={ZR,ZrR,ZS};

  const dims=[["Zelfreflectie","ZR",ZR],["Zelfregie","ZrR",ZrR],["Zelfstarten","ZS",ZS]];
  const radar=buildRadar(ZR,ZrR,ZS);

  const dimHTML=dims.map(([n,k,p])=>{
    const l=lv(p);
    return `<div class="rdim"><div class="rdim-hdr"><span class="rdim-name">${n}</span><span class="rdim-pct">${p}%</span></div><div class="rbar-track"><div class="rbar-fill" style="width:0" data-w="${p}%"></div></div><span class="rlevel" style="background:${l.bg};color:${l.col}">${l.label}</span><div class="robs">${ob(k,p)}</div></div>`;
  }).join("");

  document.getElementById("r-body").innerHTML=`
    <div class="eye">Uw Zelfkracht Quick Profiel</div>
    <div class="qtxt" style="font-size:26px;margin-bottom:6px">Uw profiel</div>
    <p style="font-size:12.5px;color:#7A6080;font-weight:300;margin-bottom:28px">Op basis van 5 situationele vragen. Voor een volledig beeld: de Diepte Scan.</p>
    <div style="display:flex;justify-content:center;margin-bottom:30px">${radar}</div>
    ${dimHTML}

    <!-- LEAD CAPTURE -->
    <div class="lead-box" id="lead-box">
      <div class="lead-eye">Optioneel</div>
      <div class="lead-title">Ontvang uw profiel per mail</div>
      <div class="lead-desc">We sturen u een samenvatting van uw Zelfkracht-profiel en laten u weten hoe u verder kunt. Geen spam.</div>
      <div id="lead-fields">
        <input class="lead-inp" id="l-name" type="text" placeholder="Naam">
        <input class="lead-inp" id="l-company" type="text" placeholder="Bedrijf">
        <input class="lead-inp" id="l-email" type="email" placeholder="E-mailadres (verplicht)">
        <button class="btn" style="width:100%;justify-content:center" onclick="saveLead()">Stuur mij mijn profiel &rarr;</button>
        <a class="lead-skip" onclick="skipLead()">Overslaan</a>
      </div>
      <div class="lead-thanks" id="lead-thanks">
        <div class="lead-thanks-icon">✓</div>
        <div class="lead-thanks-txt">Ontvangen. We nemen snel contact op.</div>
        <div class="lead-thanks-sub">Check ook de Diepte Scan voor uw team op happly.nl</div>
      </div>
    </div>

    <div class="ctabox" style="margin-top:20px">
      <h3>Wilt u het volledige beeld?</h3>
      <p>De Quick Scan geeft een eerste signaal. De Happly Diepte Scan gaat dieper: 14 vragen, managerperspectief, discrepantie-analyse en een geprioriteerd ontwikkelplan voor u of uw team.</p>
      <div class="cta-row">
        <a href="mailto:info@happly.nl?subject=Diepte Scan aanvraag" class="btn">Vraag Diepte Scan aan</a>
        <a href="https://happly.nl" class="btn btn-wt" target="_blank">Happly.nl</a>
      </div>
    </div>`;

  show("s-r");
  setTimeout(()=>document.querySelectorAll(".rbar-fill").forEach(el=>el.style.width=el.dataset.w),120);
}

async function saveLead(){
  const email=document.getElementById("l-email").value.trim();
  const name=document.getElementById("l-name").value.trim();
  const company=document.getElementById("l-company").value.trim();

  if(!email){
    const inp=document.getElementById("l-email");
    inp.classList.add("err");
    inp.placeholder="E-mailadres is verplicht";
    inp.focus();
    return;
  }

  const btn=document.querySelector("#lead-fields .btn");
  btn.textContent="Opslaan...";
  btn.disabled=true;

  const {error}=await db.from("quick_scan_leads").insert({
    name:name||null,
    company:company||null,
    email:email,
    score_zr:savedScores.ZR,
    score_zrr:savedScores.ZrR,
    score_zs:savedScores.ZS
  });

  document.getElementById("lead-fields").style.display="none";
  document.getElementById("lead-thanks").style.display="block";
}

function skipLead(){
  document.getElementById("lead-box").style.display="none";
}

function buildRadar(zr,zrr,zs){
  const C=120,R=88;
  function pt(deg,v){const a=(deg-90)*Math.PI/180,r=R*v/100;return[C+r*Math.cos(a),C+r*Math.sin(a)];}
  const axes=[[270,zr,"Zelfreflectie"],[30,zrr,"Zelfregie"],[150,zs,"Zelfstarten"]];
  let grid="",ax="",lbl="";
  [25,50,75,100].forEach(g=>{const ps=axes.map(a=>pt(a[0],g));grid+=`<polygon points="${ps.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#EAE0EE" stroke-width="1"/>`;} );
  axes.forEach(([deg,v,name])=>{
    const e=pt(deg,108),lp=pt(deg,124);
    ax+=`<line x1="${C}" y1="${C}" x2="${e[0]}" y2="${e[1]}" stroke="#EAE0EE" stroke-width="1"/>`;
    const anchor=deg===270?"middle":deg===30?"start":"end";
    lbl+=`<text x="${lp[0]}" y="${lp[1]+4}" text-anchor="${anchor}" font-family="DM Sans,sans-serif" font-size="10" fill="#5A4A6C" font-weight="500">${name}</text>`;
  });
  const dpts=axes.map(a=>pt(a[0],a[1]));
  const dots=dpts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#D6026F"/>`).join("");
  return `<svg width="240" height="240" viewBox="0 0 240 240">${grid}${ax}<polygon points="${dpts.map(p=>p.join(",")).join(" ")}" fill="rgba(214,2,111,.12)" stroke="#D6026F" stroke-width="2"/>${dots}${lbl}</svg>`;
}
</script>
</body>
</html>
