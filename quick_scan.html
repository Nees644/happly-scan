<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happly Zelfkracht Quick Scan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dp:#1A0B2E;--pk:#CC0066;--rt:#FDF0F6;--wt:#fff;--tx:#1C1C1C;--bd:#EAE0EE}
body{font-family:"DM Sans",sans-serif;background:var(--dp);min-height:100vh;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:680px;min-height:100vh;background:var(--wt);display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1;animation:fi .35s ease}
.screen.active{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hdr{background:var(--dp);padding:20px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr img{height:22px}
.dots{display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:.3s}
.dot.done{background:var(--pk)}
.dot.cur{background:#fff;width:10px;height:10px}
.ptxt{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;margin-left:6px}
.body{flex:1;padding:44px 40px 24px;display:flex;flex-direction:column}
.eye{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--pk);font-weight:500;margin-bottom:20px}
.qtxt{font-family:"DM Serif Display",serif;font-size:22px;color:var(--dp);line-height:1.3;margin-bottom:32px;max-width:540px}
.opts{display:flex;flex-direction:column;gap:11px;flex:1}
.opt{display:flex;align-items:flex-start;gap:13px;padding:14px 18px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;transition:.18s;background:#fff}
.opt:hover{border-color:var(--pk);background:var(--rt)}
.opt.sel{border-color:var(--pk);background:var(--rt)}
.ol{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#A090B8;flex-shrink:0;transition:.18s;margin-top:1px}
.opt.sel .ol{background:var(--pk);border-color:var(--pk);color:#fff}
.ot{font-size:13.5px;font-weight:300;color:var(--tx);line-height:1.5;padding-top:3px}
.foot{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--pk);color:#fff;font-family:"DM Sans",sans-serif;font-size:13.5px;font-weight:500;padding:13px 30px;border:none;border-radius:6px;cursor:pointer;transition:.2s}
.btn:hover{background:#AA0055;transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--pk);border:1.5px solid var(--pk)}
.btn.ghost:hover{background:var(--rt);transform:none}
.btn.off{opacity:.35;pointer-events:none;transform:none}
.tag{font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;background:var(--rt);color:var(--pk)}
.tags{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 36px}
.rbar-track{height:8px;background:#EDE0EE;border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;background:var(--pk);border-radius:4px;transition:width 1.1s ease}
.rlevel{font-size:10px;font-weight:500;padding:3px 11px;border-radius:12px;display:inline-block;margin:8px 0 5px}
.robs{font-size:12.5px;font-weight:300;color:#5A4A6C;line-height:1.65}
.rdim{margin-bottom:22px}
.rdim-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.rdim-name{font-size:13px;font-weight:600;color:var(--dp)}
.rdim-pct{font-size:13px;font-weight:500;color:var(--pk)}
.ctabox{background:var(--dp);border-radius:10px;padding:26px 30px;margin-top:30px}
.ctabox h3{font-family:"DM Serif Display",serif;font-size:20px;color:#fff;margin-bottom:9px}
.ctabox p{font-size:12.5px;color:rgba(255,255,255,.58);line-height:1.65;margin-bottom:18px;font-weight:300}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.btn-wt{background:#fff;color:var(--pk)}
.btn-wt:hover{background:#f0e0ec;transform:translateY(-1px)}
</style>
</head>

    <div class="foot">
      <button class="btn ghost" onclick="prev(${qi})" style="visibility:${qi===0?"hidden":"visible"}">&#8592; Vorige</button>
      <button class="btn${ans[qi]===null?" off":""}" id="bn" onclick="next(${qi})">${qi<4?"Volgende &rarr;":"Bekijk resultaat &rarr;"}</button>

}

function pick(qi,oi){ans[qi]=oi;renderQ(qi);}
function prev(qi){if(qi>0)renderQ(qi-1);}
function next(qi){if(ans[qi]===null)return;if(qi<4)renderQ(qi+1);else results();}

function results(){
  const sc=ans.map((a,i)=>QS[i].opts[a][1]);
  const ZR=Math.round((sc[0]+sc[1])/8*100);
  const ZrR=Math.round((sc[2]+sc[3])/8*100);
  const ZS=Math.round(sc[4]/4*100);
  const dims=[["Zelfreflectie","ZR",ZR],["Zelfregie","ZrR",ZrR],["Zelfstarten","ZS",ZS]];
  const radar=buildRadar(ZR,ZrR,ZS);
  const dimHTML=dims.map(([n,k,p])=>{
    const l=lv(p);
    return `<div class="rdim">
      <div class="rdim-hdr"><span class="rdim-name">${n}</span><span class="rdim-pct">${p}%</span></div>
      <div class="rbar-track"><div class="rbar-fill" style="width:0" data-w="${p}%"></div></div>
      <span class="rlevel" style="background:${l.bg};color:${l.col}">${l.label}</span>
      <div class="robs">${ob(k,p)}</div>
    </div>`;
  }).join("");
  document.getElementById("r-body").innerHTML=`
    <div class="eye">Uw Zelfkracht Quick Profiel</div>
    <div class="qtxt" style="font-size:26px;margin-bottom:6px">Uw profiel</div>
    <p style="font-size:12.5px;color:#7A6080;font-weight:300;margin-bottom:28px">Op basis van 5 situationele vragen. Voor een volledig beeld: de Diepte Scan.</p>
    <div style="display:flex;justify-content:center;margin-bottom:30px">${radar}</div>
    ${dimHTML}
    <div class="ctabox">
      <h3>Wilt u het volledige beeld?</h3>
      <p>De Quick Scan geeft een eerste signaal. De Diepte Scan gaat dieper: 14 situationele vragen, discrepantie-analyse met managerperspectief en een geprioriteerd ontwikkelplan.</p>
      <div class="cta-row">
        <a href="mailto:info@happly.nl?subject=Diepte Scan aanvraag" class="btn">Vraag Diepte Scan aan</a>
        <a href="https://happly.nl" class="btn btn-wt" target="_blank">Happly.nl</a>
      </div>
    </div>`;
  show("s-r");
  setTimeout(()=>document.querySelectorAll(".rbar-fill").forEach(el=>el.style.width=el.dataset.w),120);
}

function buildRadar(zr,zrr,zs){
  const C=120,R=88;
  function pt(deg,v){const a=(deg-90)*Math.PI/180,r=R*v/100;return[C+r*Math.cos(a),C+r*Math.sin(a)];}
  const axes=[[270,zr,"Zelfreflectie"],[30,zrr,"Zelfregie"],[150,zs,"Zelfstarten"]];
  let grid="",ax="",lbl="";
  [25,50,75,100].forEach(g=>{const ps=axes.map(a=>pt(a[0],g));grid+=`<polygon points="${ps.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#EAE0EE" stroke-width="1"/>`;} );
  axes.forEach(([deg,v,name])=>{
    const e=pt(deg,108),lp=pt(deg,124);
    ax+=`<line x1="${C}" y1="${C}" x2="${e[0]}" y2="${e[1]}" stroke="#EAE0EE" stroke-width="1"/>`;
    const anchor=deg===270?"middle":deg===30?"start":"end";
    lbl+=`<text x="${lp[0]}" y="${lp[1]+4}" text-anchor="${anchor}" font-family="DM Sans,sans-serif" font-size="10" fill="#5A4A6C" font-weight="500">${name}</text>`;
  });
  const dpts=axes.map(a=>pt(a[0],a[1]));
  const dots=dpts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#CC0066"/>`).join("");
  return `<svg width="240" height="240" viewBox="0 0 240 240">${grid}${ax}<polygon points="${dpts.map(p=>p.join(",")).join(" ")}" fill="rgba(204,0,102,.12)" stroke="#CC0066" stroke-width="2"/>${dots}${lbl}</svg>`;
}
</script>
